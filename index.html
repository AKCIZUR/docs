<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokumentace</title>

<script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/tokyo-night-dark.min.css">

<style>
:root {
    --accent: #6c8cff;
    --accent-soft: rgba(108,140,255,0.15);

    --bg-base: #0f1117;
    --bg-sidebar: #151821;
    --bg-hover: rgba(255,255,255,0.05);
    --bg-active: rgba(255,255,255,0.08);

    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.12);

    --text-main: #e6eaf2;
    --text-dim: #a8b0c0;
    --text-muted: #6b7280;

    --blur: blur(12px);

    --sidebar-width: 280px;
    --toc-width: 240px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',system-ui;
    background: radial-gradient(circle at 20% 20%, #1a1f2b, #0f1117 60%);
    color:var(--text-main);
    height:100vh;
    display:flex;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:var(--sidebar-width);
    background:var(--bg-sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
}

.sidebar-header{
    padding:1.5rem;
    border-bottom:1px solid var(--border);
}

.site-logo{
    display:flex;
    gap:0.6rem;
    align-items:center;
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

/* SEARCH */
.search-container{padding:1rem;}

#search{
    width:100%;
    background:rgba(255,255,255,0.04);
    backdrop-filter:var(--blur);
    border:1px solid var(--border);
    border-radius:8px;
    padding:0.6rem;
    color:#fff;
}

#search:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 2px var(--accent-soft);
}

/* TREE */
.nav-tree{
    flex:1;
    overflow-y:auto;
    padding:0.5rem;
    list-style:none;
}

.tree-node{margin-bottom:2px;}

.tree-item{
    display:flex;
    align-items:center;
    padding:0.5rem 0.75rem;
    border-radius:8px;
    cursor:pointer;
    color:var(--text-dim);
    font-size:0.875rem;
}

.tree-item:hover{
    background:var(--bg-hover);
    color:#fff;
}

.tree-item.active{
    background:var(--bg-active);
    border:1px solid var(--border-strong);
    color:#fff;
}

.toggle{
    width:1.25rem;
    margin-right:0.25rem;
    color:var(--text-muted);
}

.children{
    display:none;
    padding-left:1.25rem;
    margin-left:0.6rem;
    border-left:1px solid var(--border);
}

.tree-node.open>.children{display:block;}

/* LAYOUT */
.viewport{
    flex:1;
    display:flex;
    overflow:hidden;
}

.content-wrapper{
    flex:1;
    overflow-y:auto;
    padding:2rem;
}

.content-container{
    max-width:800px;
    margin:0 auto;
}

/* BREADCRUMBS */
.breadcrumbs{
    font-size:0.8rem;
    color:var(--text-muted);
    margin-bottom:2rem;
}

/* TOC */
.toc-sidebar{
    width:var(--toc-width);
    padding:3rem 1rem;
    border-left:1px solid var(--border);
    overflow-y:auto;
}

@media(max-width:1200px){
    .toc-sidebar{display:none;}
}

.toc-item{
    display:block;
    font-size:0.85rem;
    color:var(--text-dim);
    margin-bottom:0.5rem;
    text-decoration:none;
}

.toc-item:hover{color:var(--accent);}

/* MARKDOWN */
.markdown-body h1{font-size:2.2rem;margin-bottom:2rem;}
.markdown-body h2{margin-top:2rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.markdown-body p{color:var(--text-dim);}

/* CODE */
.code-wrap{position:relative;margin:1.5rem 0;}

.copy-btn{
    position:absolute;
    top:0.5rem;
    right:0.5rem;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:var(--text-muted);
    padding:0.2rem 0.5rem;
    border-radius:6px;
    font-size:0.7rem;
    cursor:pointer;
    opacity:0;
}

.code-wrap:hover .copy-btn{opacity:1;}

.markdown-body pre{
    background:rgba(255,255,255,0.04);
    backdrop-filter:var(--blur);
    border:1px solid var(--border);
    border-radius:10px;
    padding:1rem;
}

.markdown-body code{
    font-family:'JetBrains Mono',monospace;
}

/* MOBILE */
#menu-toggle{
    display:none;
    position:fixed;
    bottom:2rem;
    right:2rem;
    width:3rem;
    height:3rem;
    border:none;
    border-radius:50%;
    background:var(--accent);
    color:white;
}

@media(max-width:768px){
    .sidebar{
        position:fixed;
        transform:translateX(-100%);
        transition:.3s;
        height:100%;
    }
    body.sidebar-open .sidebar{transform:translateX(0);}
    #menu-toggle{display:block;}
}

/* LOADER */
.loader{display:flex;justify-content:center;padding:5rem;}
.spinner{
    width:2rem;height:2rem;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<button id="menu-toggle">☰</button>

<aside class="sidebar">
    <div class="sidebar-header">
        <a href="#" class="site-logo">Dokumentace</a>
    </div>
    <div class="search-container">
        <input id="search" placeholder="Hledat...">
    </div>
    <ul class="nav-tree" id="fileTree"></ul>
</aside>

<div class="viewport">
    <div class="content-wrapper" id="scroll-container">
        <div class="content-container">
            <div class="breadcrumbs" id="breadcrumbs"></div>
            <main class="markdown-body" id="content">
                <div class="loader"><div class="spinner"></div></div>
            </main>
        </div>
    </div>

    <aside class="toc-sidebar">
        <nav id="toc-list"></nav>
    </aside>
</div>

<script>
const CONFIG = { owner:'filipstrnad', repo:'blog-docs', defaultFile:'README.md' };

async function fetchGH(path=''){
    const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
    return res.ok ? await res.json() : [];
}

async function getTree(path=''){
    const items = await fetchGH(path);
    const nodes = [];
    for(const item of items){
        if(item.type==='dir'){
            const children = await getTree(item.path);
            if(children.length) nodes.push({type:'dir',name:item.name,path:item.path,children});
        } else if(item.name.endsWith('.md')){
            nodes.push({type:'file',name:item.name.replace(/\.md$/,''),path:item.path,url:item.download_url});
        }
    }
    return nodes;
}

function renderTree(nodes,container){
    nodes.forEach(node=>{
        const li=document.createElement('li');
        li.className='tree-node';

        const item=document.createElement('div');
        item.className='tree-item';
        item.innerHTML=`<span class="toggle">${node.type==='dir'?'▶':''}</span><span>${node.name}</span>`;
        li.appendChild(item);

        if(node.type==='dir'){
            const ul=document.createElement('ul');
            ul.className='children';
            renderTree(node.children,ul);
            li.appendChild(ul);
            item.onclick=()=>li.classList.toggle('open');
        } else {
            item.onclick=()=>{
                document.querySelectorAll('.tree-item').forEach(i=>i.classList.remove('active'));
                item.classList.add('active');
                loadFile(node.url,node.path);
            };
        }

        container.appendChild(li);
    });
}

async function loadFile(url,path){
    const el=document.getElementById('content');
    el.innerHTML='<div class="loader"><div class="spinner"></div></div>';

    const text=await fetch(url).then(r=>r.text());
    el.innerHTML = `<h1>${path.split('/').pop().replace('.md','')}</h1>` + marked.parse(text);

    document.getElementById('scroll-container').scrollTop=0;
}

document.getElementById('menu-toggle').onclick=()=>document.body.classList.toggle('sidebar-open');

async function init(){
    const tree=await getTree();
    renderTree(tree,fileTree);
}

init();
</script>

</body>
</html>
