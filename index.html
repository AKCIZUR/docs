<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/tokyo-night-dark.min.css">
    <style>
        :root {
            --accent: #4b6ef5;
            --accent-hover: #6382f7;
            --accent-subtle: rgba(75, 110, 245, 0.15);
            --bg-base: #1a1d23;
            --bg-sidebar: #151820;
            --bg-sidebar-hover: #1e2230;
            --bg-sidebar-active: #252a3a;
            --bg-code: #0d1017;
            --border: #252a37;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
        }

        .site-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .search-container { padding: 0 1rem 1rem; }

        #search {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem 0.75rem;
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
        }

        #search:focus { border-color: var(--accent); }

        .nav-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.75rem;
            list-style: none;
        }

        .tree-node { list-style: none; margin-bottom: 2px; }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-dim);
            transition: all 0.15s ease;
        }

        .tree-item:hover { background: var(--bg-sidebar-hover); color: var(--text-main); }
        .tree-item.active { background: var(--bg-sidebar-active); color: var(--accent); font-weight: 500; }

        .toggle {
            width: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.25rem;
            transition: transform 0.2s ease;
        }

        .tree-node.open > .tree-item > .toggle { transform: rotate(90deg); }

        .children {
            display: none;
            padding-left: 1.25rem;
            border-left: 1px solid var(--border);
            margin-left: 0.6rem;
        }

        .tree-node.open > .children { display: block; }

        /* Content Area */
        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-base);
            scroll-behavior: smooth;
        }

        .content {
            max-width: 840px;
            margin: 0 auto;
            padding: 5rem 2.5rem;
        }

        /* Markdown Styling */
        .markdown-body { font-size: 1rem; color: var(--text-dim); }
        .markdown-body h1 { font-size: 2.5rem; color: #fff; margin-bottom: 1.5rem; }
        .markdown-body h2 { font-size: 1.75rem; color: #fff; margin: 2rem 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
        .markdown-body pre { background: var(--bg-code); padding: 1.5rem; border-radius: var(--radius-lg); margin: 1.5rem 0; border: 1px solid var(--border); overflow-x: auto; }
        .markdown-body code { font-family: var(--font-mono); background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: var(--radius-sm); font-size: 0.85em; }
        .markdown-body blockquote { border-left: 4px solid var(--accent); padding-left: 1.5rem; color: var(--text-main); font-style: italic; margin: 1.5rem 0; }

        /* Loader */
        .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; }
        .spinner { width: 2.5rem; height: 2.5rem; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        #menu-toggle {
            display: none;
            position: fixed;
            bottom: 2rem; right: 2rem;
            width: 3.5rem; height: 3.5rem;
            background: var(--accent);
            color: white; border-radius: 50%;
            border: none; z-index: 1000;
            cursor: pointer; font-size: 1.5rem;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            body.sidebar-open .sidebar { transform: translateX(0); }
            #menu-toggle { display: block; }
            .content { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>
    <button id="menu-toggle">☰</button>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="site-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--accent)">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span id="site-name">Dokumentace</span>
            </a>
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Hledat v dokumentech...">
        </div>
        <ul class="nav-tree" id="fileTree"></ul>
    </aside>

    <div class="content-wrapper">
        <main class="content markdown-body" id="content">
            <div class="loader">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; color: var(--text-muted);">Načítám...</p>
            </div>
        </main>
    </div>

    <script>
        const CONFIG = {
            owner: 'filipstrnad',
            repo: 'blog-docs',
            defaultFile: 'README.md'
        };

        const API_URL = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents`;

        // Marked.js options
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        async function fetchPath(path = '') {
            try {
                const response = await fetch(`${API_URL}/${path}`);
                if (!response.ok) throw new Error('GitHub API Error');
                return await response.json();
            } catch (err) {
                console.error(err);
                return null;
            }
        }

        async function getTree(path = '') {
            const items = await fetchPath(path);
            if (!items || !Array.isArray(items)) return [];

            const tree = [];
            for (const item of items) {
                if (item.type === 'dir') {
                    const children = await getTree(item.path);
                    if (children.length > 0) {
                        tree.push({ type: 'dir', name: item.name, path: item.path, children });
                    }
                } else if (item.name.toLowerCase().endsWith('.md')) {
                    tree.push({ 
                        type: 'file', 
                        name: item.name.replace(/\.md$/i, ''), 
                        path: item.path, 
                        url: item.download_url 
                    });
                }
            }
            return tree.sort((a, b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1));
        }

        function renderTree(nodes, container) {
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = 'tree-node';

                const item = document.createElement('div');
                item.className = 'tree-item';
                item.innerHTML = `
                    <span class="toggle">${node.type === 'dir' ? '▸' : ''}</span>
                    <span class="name">${node.name}</span>
                `;

                li.appendChild(item);

                if (node.type === 'dir') {
                    const childrenUl = document.createElement('ul');
                    childrenUl.className = 'children';
                    renderTree(node.children, childrenUl);
                    li.appendChild(childrenUl);

                    item.onclick = () => li.classList.toggle('open');
                } else {
                    item.onclick = () => {
                        document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        loadFile(node.url, node.name);
                        if (window.innerWidth <= 768) document.body.classList.remove('sidebar-open');
                    };
                    item.setAttribute('data-url', node.url);
                }
                container.appendChild(li);
            });
        }

        async function loadFile(url, title) {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

            try {
                const res = await fetch(url);
                let text = await res.text();
                
                // Pokud markdown obsahuje H1 se stejným názvem, nepíšeme ho znovu
                const hasH1 = /^#\s+/m.test(text);
                const htmlContent = marked.parse(text);
                
                container.innerHTML = (hasH1 ? '' : `<h1>${title}</h1>`) + htmlContent;
                
                // Highlight code blocks
                container.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });

                document.querySelector('.content-wrapper').scrollTop = 0;
            } catch (err) {
                container.innerHTML = `<p style="color: #ef4444">Chyba: Obsah nelze načíst.</p>`;
            }
        }

        // Search logic
        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.tree-node').forEach(node => {
                const name = node.querySelector('.name').textContent.toLowerCase();
                const match = name.includes(val);
                node.style.display = match || val === '' ? '' : 'none';
                if (val !== '' && match) {
                    let p = node.parentElement.closest('.tree-node');
                    while(p) { p.classList.add('open'); p = p.parentElement.closest('.tree-node'); }
                }
            });
        };

        document.getElementById('menu-toggle').onclick = () => document.body.classList.toggle('sidebar-open');

        async function init() {
            const tree = await getTree();
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            renderTree(tree, container);

            // Load default or first
            const findFirst = (list) => {
                for(let n of list) {
                    if(n.type === 'file') return n;
                    if(n.children) { const f = findFirst(n.children); if(f) return f; }
                }
            };

            const first = findFirst(tree);
            if (first) loadFile(first.url, first.name);
        }

        init();
    </script>
</body>
</html>
