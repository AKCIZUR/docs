<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/default.min.css">
    <link id="hljs-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/dracula.min.css" disabled>
    <style>
        :root{--bg:#f8f9fa;--fg:#212529;--bg-card:#fff;--border:#dee2e6;--hover:#f8f9fa;--select:#e3f2fd;--primary:#0d6efd;--spinner:var(--primary);--toggle:#6c757d;}
        body.dark{--bg:#0a0a0a;--fg:#f8f9f9;--bg-card:#161616;--border:#333;--hover:#1f1f1f;--select:#1e40af;--primary:#3b82f6;--spinner:var(--primary);--toggle:#adb5bd;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        .topbar{display:flex;align-items:center;padding:0 1rem;height:60px;background:var(--bg-card);border-bottom:1px solid var(--border);flex:none;z-index:10;}
        #menu-btn{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;padding:.5rem;color:var(--fg);}
        #site-title{margin:0 1rem;font-size:1.2rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .topbar-right{display:flex;align-items:center;gap:.5rem;}
        #search{padding:.5rem .75rem;border:1px solid var(--border);border-radius:.375rem;background:var(--bg-card);color:var(--fg);width:150px;}
        #theme-toggle{border:none;background:none;font-size:1.25rem;cursor:pointer;padding:.5rem;border-radius:.25rem;transition:.2s;}
        #theme-toggle:hover{background:var(--hover);}
        .main{flex:1;display:flex;overflow:hidden;position:relative;}
        .sidebar{width:280px;background:var(--bg-card);border-right:1px solid var(--border);overflow:auto;position:relative;}
        #fileTree{list-style:none;}
        .tree-item{cursor:pointer;user-select:none;display:flex;align-items:center;padding:.5rem 1rem;transition:.2s;border-left:3px solid transparent;}
        .tree-item:hover{background:var(--hover);}
        .tree-item.active{background:var(--select);border-left-color:var(--primary);font-weight:500;}
        .toggle{margin-right:.5rem;width:1rem;text-align:center;color:var(--toggle);transition:.2s;font-size:0.8rem;}
        .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .children{padding-left:1rem;display:none;}
        .tree-item.open > .children{display:block;}
        .content{flex:1;padding:2rem;overflow:auto;background:var(--bg-card);line-height:1.6;}
        .content img{max-width:100%;height:auto;border-radius:4px;}
        .loading{text-align:center;padding:3rem 1rem;color:var(--fg);}
        .error-box{background:#fff1f0;border:1px solid #ffa39e;color:#cf1322;padding:1rem;border-radius:4px;margin:1rem;}
        body.dark .error-box{background:#2a1215;border-color:#5c0011;color:#ff4d4f;}
        .spinner{margin:0 auto 1rem;width:3rem;height:3rem;border:3px solid var(--border);border-top-color:var(--spinner);border-radius:50%;animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)};}
        .doc-title{margin-bottom:2rem;color:var(--fg);border-bottom:2px solid var(--border);padding-bottom:.5rem;}
        .overlay{display:none;position:fixed;top:60px;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:99;}
        @media(max-width:768px){#menu-btn{display:block;}.sidebar{position:fixed;top:60px;left:0;bottom:0;width:280px;z-index:100;transform:translateX(-100%);transition:transform .3s ease;}body.sidebar-open .sidebar{transform:translateX(0);}body.sidebar-open .overlay{display:block;}.content{padding:1.5rem;}#search{width:100px;}}
    </style>
</head>
<body>
    <header class="topbar">
        <button id="menu-btn">☰</button>
        <h1 id="site-title">Dokumentace</h1>
        <div class="topbar-right">
            <input type="text" id="search" placeholder="Hledat...">
            <button id="theme-toggle">🌙</button>
        </div>
    </header>
    <div class="overlay" id="overlay"></div>
    <div class="main">
        <nav class="sidebar" id="sidebar">
            <ul id="fileTree"></ul>
        </nav>
        <main class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Inicializace...</p>
            </div>
        </main>
    </div>

    <script>
        /**
         * --- KONFIGURACE ---
         * Pokud aplikace neběží na GitHub Pages, vyplňte prosím tyto údaje ručně:
         */
        const CONFIG = {
            owner: 'filipstrnad', // VAŠE UŽIVATELSKÉ JMÉNO NA GITHUB
            repo: 'blog-docs',    // NÁZEV VAŠEHO REPOZITÁŘE
            rootPath: '',         // Složka, kde jsou .md soubory (nechejte prázdné pro kořen)
            siteName: 'Moje Dokumentace',
            defaultFile: 'README.md'
        };

        let OWNER = CONFIG.owner;
        let REPO = CONFIG.repo;
        let ROOT_PATH = CONFIG.rootPath;
        let SITE_NAME = CONFIG.siteName;

        // --- AUTOMATICKÁ DETEKCE PRO GITHUB PAGES ---
        const host = window.location.hostname;
        const path = window.location.pathname;

        if (host.endsWith('.github.io')) {
            OWNER = host.split('.')[0];
            const segments = path.split('/').filter(s => s && !s.endsWith('.html'));
            if (segments.length > 0) {
                REPO = segments[0];
            }
            SITE_NAME = REPO.charAt(0).toUpperCase() + REPO.slice(1).replace(/-/g, ' ');
        }

        document.title = SITE_NAME;
        document.getElementById('site-title').textContent = SITE_NAME;

        const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
        let tree = [];

        // --- NAČÍTÁNÍ ---
        async function fetchFiles(targetPath = '') {
            try {
                const fullPath = [ROOT_PATH, targetPath].filter(Boolean).join('/');
                const url = fullPath ? `${API_BASE}/${fullPath}` : API_BASE;
                
                const res = await fetch(url);
                if (res.status === 404) {
                    throw new Error(`Repozitář nebo složka neexistuje (${OWNER}/${REPO}). Zkontrolujte nastavení CONFIG v kódu.`);
                }
                if (!res.ok) throw new Error(`Chyba API: ${res.status} ${res.statusText}`);
                
                const data = await res.json();
                if (!Array.isArray(data)) return [];

                return data.filter(item => 
                    (item.type === 'file' && item.name.toLowerCase().endsWith('.md')) || item.type === 'dir'
                ).sort((a,b) => {
                    if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
                    return a.name.localeCompare(b.name);
                });
            } catch (e) {
                showError(e.message);
                return [];
            }
        }

        async function buildTree(targetPath = '', depth = 0) {
            const items = await fetchFiles(targetPath);
            const nodes = [];
            for (const item of items) {
                if (item.type === 'dir') {
                    const children = await buildTree(item.path, depth + 1);
                    // Přidáme složku jen pokud obsahuje MD soubory nebo další složky
                    if (children.length > 0) {
                        nodes.push({ type: 'dir', name: item.name, path: item.path, children, depth, open: false });
                    }
                } else {
                    nodes.push({ type: 'file', name: item.name.replace(/\.md$/i,''), path: item.path, download_url: item.download_url, depth });
                }
            }
            return nodes;
        }

        // --- UI ---
        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="error-box">
                    <strong>⚠️ Chyba při načítání:</strong><br>${msg}
                </div>
            `;
        }

        function renderTree(nodes, parent) {
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = 'tree-node';
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'tree-item';
                
                const toggleIcon = node.type === 'dir' ? `<span class="toggle">▶</span>` : '<span class="toggle"></span>';
                itemDiv.innerHTML = `${toggleIcon}<span class="name" data-path="${node.path}" data-url="${node.download_url || ''}">${node.name}</span>`;
                
                li.appendChild(itemDiv);

                if (node.type === 'dir') {
                    const ul = document.createElement('ul');
                    ul.className = 'children';
                    renderTree(node.children, ul);
                    li.appendChild(ul);

                    itemDiv.onclick = (e) => {
                        if (e.target.closest('.name') && node.type === 'file') return; // Neřešit zde
                        const isOpen = li.classList.toggle('open');
                        itemDiv.querySelector('.toggle').textContent = isOpen ? '▼' : '▶';
                    };
                } else {
                    itemDiv.onclick = () => {
                        loadFile(node.path, node.download_url);
                        if (window.innerWidth < 768) document.body.classList.remove('sidebar-open');
                    };
                }
                parent.appendChild(li);
            });
        }

        async function loadFile(path, downloadUrl) {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="loading"><div class="spinner"></div><p>Načítám dokument...</p></div>`;
            
            try {
                const res = await fetch(downloadUrl);
                if (!res.ok) throw new Error("Soubor nelze stáhnout.");
                const md = await res.text();
                
                const title = path.split('/').pop().replace(/\.md$/i, '');
                content.innerHTML = `<h1 class="doc-title">${title}</h1>` + marked.parse(md);
                
                // Highlight.js
                content.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                content.scrollTop = 0;
                
                // Aktivní stav v menu
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
                const activeName = document.querySelector(`[data-path="${path}"]`);
                if (activeName) activeName.closest('.tree-item').classList.add('active');

            } catch (e) {
                showError(`Nepodařilo se načíst soubor: ${path}`);
            }
        }

        // --- THEME & EVENTS ---
        let isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const applyTheme = () => {
            document.body.classList.toggle('dark', isDark);
            document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
            document.getElementById('hljs-light').disabled = isDark;
            document.getElementById('hljs-dark').disabled = !isDark;
        };
        applyTheme();

        document.getElementById('theme-toggle').onclick = () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
        };

        document.getElementById('search').oninput = e => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.tree-node').forEach(node => {
                const nameText = node.querySelector('.name').textContent.toLowerCase();
                const isMatch = nameText.includes(term);
                node.style.display = (term === '' || isMatch) ? '' : 'none';
                if (term !== '' && isMatch) {
                    // Pokud hledáme, rozbalíme rodiče
                    let parent = node.parentElement.closest('.tree-node');
                    while(parent) {
                        parent.classList.add('open');
                        const t = parent.querySelector('.toggle');
                        if (t) t.textContent = '▼';
                        parent = parent.parentElement.closest('.tree-node');
                    }
                }
            });
        };

        document.getElementById('menu-btn').onclick = () => document.body.classList.toggle('sidebar-open');
        document.getElementById('overlay').onclick = () => document.body.classList.remove('sidebar-open');

        // --- START ---
        async function init() {
            tree = await buildTree('');
            if (tree.length === 0) return; // Chyba už se zobrazila ve fetchFiles

            const treeEl = document.getElementById('fileTree');
            treeEl.innerHTML = '';
            renderTree(tree, treeEl);
            
            // Najít README nebo první soubor
            const allFiles = [];
            const flatten = (nodes) => nodes.forEach(n => { if(n.type==='file') allFiles.push(n); if(n.children) flatten(n.children); });
            flatten(tree);

            const defaultFile = allFiles.find(f => f.path.toLowerCase().endsWith(CONFIG.defaultFile.toLowerCase())) || allFiles[0];
            if (defaultFile) loadFile(defaultFile.path, defaultFile.download_url);
        }
        
        init();
    </script>
</body>
</html>
