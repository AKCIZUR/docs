<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentace - Minimal Glass</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css">
    <style>
        :root {
            --accent: #a5b4fc;
            --bg-body: #0a0c10;
            --bg-glass: rgba(17, 19, 24, 0.7);
            --bg-content: rgba(22, 25, 30, 0.6);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-main: #d1d5db;
            --text-dim: #9ca3af;
            --text-muted: #6b7280;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%);
            z-index: -1;
            opacity: 0.4;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 2rem 1.5rem 1rem;
        }

        .site-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .search-container { padding: 1rem 1.5rem; }
        #search {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
        }
        #search:focus { border-color: rgba(255,255,255,0.15); }

        .nav-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 1rem;
            list-style: none;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 0.45rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: 0.2s;
        }
        .tree-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .tree-item.active { color: var(--accent); background: rgba(165, 180, 252, 0.06); }

        .toggle { width: 1.2rem; font-size: 0.6rem; opacity: 0.3; transition: transform 0.2s; }
        .tree-node.open > .tree-item > .toggle { transform: rotate(90deg); }
        
        .children { display: none; padding-left: 0.8rem; border-left: 1px solid var(--border-subtle); margin-left: 0.6rem; }
        .tree-node.open > .children { display: block; }

        .viewport { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }

        .content-container {
            max-width: 760px;
            margin: 4rem auto 8rem;
            padding: 0 2rem;
        }

        .breadcrumbs {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .markdown-body { font-size: 1rem; line-height: 1.7; }
        .markdown-body h1 { font-size: 2.25rem; color: #fff; margin-bottom: 2rem; font-weight: 600; }
        .markdown-body h2 { font-size: 1.4rem; color: #fff; margin: 3rem 0 1rem; font-weight: 500; }
        .markdown-body p { margin-bottom: 1.25rem; }
        
        pre { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 1.25rem; 
            border-radius: 10px; 
            border: 1px solid var(--border-subtle);
            margin: 1.5rem 0;
            overflow-x: auto;
        }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: var(--accent); }
        pre code { color: inherit; font-size: 0.9em; }

        .toc-sidebar {
            position: fixed;
            top: 4rem;
            right: 2rem;
            width: 200px;
        }
        @media (max-width: 1250px) { .toc-sidebar { display: none; } }
        
        .toc-list { list-style: none; padding-left: 0.5rem; border-left: 1px solid var(--border-subtle); }
        .toc-item { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.6rem; text-decoration: none; display: block; }
        .toc-item:hover { color: var(--accent); }

        .loader { width: 20px; height: 20px; border: 2px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #menu-toggle { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; width: 3rem; height: 3rem; border-radius: 50%; background: var(--accent); color: #000; border: none; z-index: 100; font-size: 1.2rem; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; transition: 0.3s; }
            body.sidebar-open .sidebar { left: 0; }
            #menu-toggle { display: flex; align-items: center; justify-content: center; }
            .content-container { margin-top: 2rem; }
        }
    </style>
</head>
<body>
    <button id="menu-toggle">☰</button>
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="site-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span>DOKUMENTACE</span>
            </a>
        </div>
        <div class="search-container"><input type="text" id="search" placeholder="Hledat..."></div>
        <ul class="nav-tree" id="fileTree"></ul>
    </aside>

    <div class="viewport" id="scroll-container">
        <div class="content-container">
            <nav class="breadcrumbs" id="breadcrumbs"></nav>
            <main class="markdown-body" id="content">
                <div style="display:flex; justify-content:center; padding-top: 4rem;"><div class="loader"></div></div>
            </main>
        </div>
        <aside class="toc-sidebar">
            <nav class="toc-list" id="toc-list"></nav>
        </aside>
    </div>

    <script>
        const CONFIG = { owner: 'filipstrnad', repo: 'blog-docs' };

        // Pomocná funkce pro fetch z GitHub API
        async function fetchGH(path = '') {
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
                if (!res.ok) {
                    console.error(`GitHub API error: ${res.status}`);
                    return null;
                }
                return await res.json();
            } catch (err) {
                console.error("Fetch error:", err);
                return null;
            }
        }

        // Rekurzivní stavba stromu
        async function buildTree(path = '') {
            const items = await fetchGH(path);
            if (!items || !Array.isArray(items)) return [];
            
            const nodes = [];
            for (const item of items) {
                if (item.type === 'dir') {
                    // Ignorujeme skryté složky
                    if (item.name.startsWith('.')) continue;
                    const children = await buildTree(item.path);
                    nodes.push({ type: 'dir', name: item.name, path: item.path, children });
                } else if (item.name.toLowerCase().endsWith('.md')) {
                    nodes.push({ type: 'file', name: item.name.replace(/\.md$/i, ''), path: item.path, url: item.download_url });
                }
            }
            // Složky nahoru, pak soubory abecedně
            return nodes.sort((a, b) => a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1);
        }

        // Vykreslení stromu do DOM
        function renderTree(nodes, container) {
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = 'tree-node';
                const div = document.createElement('div');
                div.className = 'tree-item';
                div.innerHTML = `<span class="toggle">${node.type === 'dir' ? '▶' : ''}</span><span>${node.name}</span>`;
                li.appendChild(div);

                if (node.type === 'dir') {
                    const ul = document.createElement('ul');
                    ul.className = 'children';
                    renderTree(node.children, ul);
                    li.appendChild(ul);
                    div.onclick = (e) => {
                        e.stopPropagation();
                        li.classList.toggle('open');
                    };
                } else {
                    div.onclick = (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
                        div.classList.add('active');
                        loadFile(node.url, node.path);
                        if (window.innerWidth <= 768) document.body.classList.remove('sidebar-open');
                    };
                    div.dataset.path = node.path;
                    div.dataset.url = node.url;
                }
                container.appendChild(li);
            });
        }

        // Načtení konkrétního souboru
        async function loadFile(url, path) {
            const content = document.getElementById('content');
            content.innerHTML = '<div style="display:flex; justify-content:center; padding-top: 4rem;"><div class="loader"></div></div>';
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Nelze načíst obsah souboru.");
                const text = await res.text();
                
                // Převod markdownu
                content.innerHTML = marked.parse(text);
                
                // Breadcrumbs
                const parts = path.split('/');
                document.getElementById('breadcrumbs').innerHTML = parts.map(p => p.replace(/\.md$/i, '')).join(' <span style="opacity:0.2">/</span> ');

                // Generování TOC (Obsahu)
                const toc = document.getElementById('toc-list');
                toc.innerHTML = '';
                document.querySelectorAll('#content h2').forEach((h, i) => {
                    h.id = `sec-${i}`;
                    const a = document.createElement('a');
                    a.className = 'toc-item';
                    a.textContent = h.textContent;
                    a.href = `#sec-${i}`;
                    a.onclick = e => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth' }); };
                    toc.appendChild(a);
                });

                // Highlight kódu
                document.querySelectorAll('pre code').forEach(c => hljs.highlightElement(c));
                
                // Scroll nahoru
                document.getElementById('scroll-container').scrollTop = 0;
            } catch (err) {
                content.innerHTML = `<p style="color: #f87171; padding: 2rem; text-align:center;">${err.message}</p>`;
            }
        }

        // Vyhledávání
        document.getElementById('search').oninput = e => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.tree-node').forEach(n => {
                const text = n.querySelector('.tree-item span:last-child').textContent.toLowerCase();
                const match = text.includes(q);
                n.style.display = match ? '' : 'none';
                if (q && match) {
                    let parent = n.parentElement.closest('.tree-node');
                    while(parent) { parent.classList.add('open'); parent = parent.parentElement.closest('.tree-node'); }
                }
            });
        };

        document.getElementById('menu-toggle').onclick = () => document.body.classList.toggle('sidebar-open');

        // Spuštění
        (async function init() {
            const tree = await buildTree();
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            
            if (tree.length === 0) {
                document.getElementById('content').innerHTML = '<p style="text-align:center; opacity:0.5; padding-top:4rem;">V repozitáři nebyly nalezeny žádné .md soubory.</p>';
                return;
            }

            renderTree(tree, container);

            // Najít výchozí soubor (README nebo první soubor)
            const findFirstFile = (nodes) => {
                let readme = null;
                let first = null;
                
                const traverse = (list) => {
                    for (const n of list) {
                        if (n.type === 'file') {
                            if (!first) first = n;
                            if (n.name.toLowerCase() === 'readme') readme = n;
                        } else if (n.children) {
                            traverse(n.children);
                        }
                        if (readme) break;
                    }
                };
                
                traverse(nodes);
                return readme || first;
            };

            const start = findFirstFile(tree);
            if (start) {
                loadFile(start.url, start.path);
                // Označit jako aktivní v menu
                const activeItem = document.querySelector(`[data-url="${start.url}"]`);
                if (activeItem) {
                    activeItem.classList.add('active');
                    let parent = activeItem.closest('.tree-node');
                    while(parent) { parent.classList.add('open'); parent = parent.parentElement.closest('.tree-node'); }
                }
            }
        })();
    </script>
</body>
</html>
