<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokumentace</title>

<script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/tokyo-night-dark.min.css">

<style>
:root {
    --accent: #6c8cff;
    --accent-soft: rgba(108,140,255,0.15);

    --bg-base: #0f1117;
    --bg-elev: #151821;
    --bg-glass: rgba(255,255,255,0.04);

    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.12);

    --text-main: #e6eaf2;
    --text-dim: #a8b0c0;
    --text-muted: #6b7280;

    --blur: blur(12px);

    --sidebar-width: 280px;
    --toc-width: 240px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: 'Inter', system-ui;
    background: radial-gradient(circle at 20% 20%, #1a1f2b, #0f1117 60%);
    color: var(--text-main);
    height:100vh;
    display:flex;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:var(--sidebar-width);
    background:var(--bg-elev);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
}

.sidebar-header{
    padding:1.5rem;
    border-bottom:1px solid var(--border);
}

.site-logo{
    display:flex;
    gap:0.6rem;
    align-items:center;
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

/* SEARCH */
.search-container{padding:1rem;}

#search{
    width:100%;
    background:var(--bg-glass);
    backdrop-filter:var(--blur);
    border:1px solid var(--border);
    border-radius:8px;
    padding:0.6rem;
    color:#fff;
}

#search:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 2px var(--accent-soft);
}

/* TREE */
.nav-tree{
    flex:1;
    overflow-y:auto;
    padding:0.5rem;
}

.tree-item{
    padding:0.5rem 0.75rem;
    border-radius:8px;
    cursor:pointer;
    color:var(--text-dim);
}

.tree-item:hover{
    background:rgba(255,255,255,0.05);
    color:#fff;
}

.tree-item.active{
    background:rgba(255,255,255,0.08);
    border:1px solid var(--border-strong);
    color:#fff;
}

/* LAYOUT */
.viewport{
    flex:1;
    display:flex;
}

.content-wrapper{
    flex:1;
    overflow-y:auto;
    padding:2rem;
}

.content-container{
    max-width:800px;
    margin:auto;
}

/* TOC */
.toc-sidebar{
    width:var(--toc-width);
    border-left:1px solid var(--border);
    padding:3rem 1rem;
}

@media(max-width:1200px){
    .toc-sidebar{display:none;}
}

/* MARKDOWN */
.markdown-body h1{font-size:2rem;margin-bottom:2rem;}
.markdown-body h2{margin-top:2rem;}
.markdown-body p{color:var(--text-dim);}

/* CODE */
.markdown-body pre{
    background:var(--bg-glass);
    backdrop-filter:var(--blur);
    border:1px solid var(--border);
    border-radius:10px;
    padding:1rem;
}

/* MOBILE */
#menu-toggle{
    display:none;
    position:fixed;
    bottom:2rem;
    right:2rem;
    width:3rem;
    height:3rem;
    background:var(--accent);
    border:none;
    border-radius:50%;
    color:white;
}

@media(max-width:768px){
    .sidebar{
        position:fixed;
        transform:translateX(-100%);
        transition:.3s;
        height:100%;
    }
    body.sidebar-open .sidebar{
        transform:translateX(0);
    }
    #menu-toggle{display:block;}
}
</style>
</head>

<body>

<button id="menu-toggle">☰</button>

<aside class="sidebar">
    <div class="sidebar-header">
        <a href="#" class="site-logo">Dokumentace</a>
    </div>
    <div class="search-container">
        <input id="search" placeholder="Hledat...">
    </div>
    <ul class="nav-tree" id="fileTree"></ul>
</aside>

<div class="viewport">
    <div class="content-wrapper" id="scroll-container">
        <div class="content-container">
            <div id="breadcrumbs"></div>
            <main id="content">
                <div>Loading...</div>
            </main>
        </div>
    </div>

    <aside class="toc-sidebar">
        <nav id="toc-list"></nav>
    </aside>
</div>

<script>
const CONFIG = { owner:'filipstrnad', repo:'blog-docs' };

async function fetchGH(path=''){
    const r = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
    return r.json();
}

async function getTree(path=''){
    const items = await fetchGH(path);
    let out=[];
    for(const i of items){
        if(i.type==='dir'){
            out.push({type:'dir',name:i.name,path:i.path,children:await getTree(i.path)});
        }else if(i.name.endsWith('.md')){
            out.push({type:'file',name:i.name,path:i.path,url:i.download_url});
        }
    }
    return out;
}

function renderTree(nodes,el){
    nodes.forEach(n=>{
        const d=document.createElement('div');
        d.className='tree-item';
        d.textContent=n.name;

        if(n.type==='file'){
            d.onclick=()=>loadFile(n.url,n.path);
        }

        el.appendChild(d);
    });
}

async function loadFile(url){
    const t = await fetch(url).then(r=>r.text());
    content.innerHTML = marked.parse(t);
}

async function init(){
    const tree = await getTree();
    renderTree(tree,fileTree);
}

init();
</script>

</body>
</html>
