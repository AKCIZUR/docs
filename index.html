<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docs viewer</title>

  <!-- Highlight.js CSS -->
  <link id="hljs-theme" rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #eaeaea;
      display: flex;
    }

    aside {
      width: 260px;
      background: #151515;
      padding: 16px;
      border-right: 1px solid #222;
      height: 100vh;
      overflow-y: auto;
    }

    main {
      flex: 1;
      padding: 32px;
      max-width: 900px;
      margin: auto;
    }

    pre {
      border-radius: 10px;
      overflow: auto;
      padding: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
      margin-bottom: 12px;
    }

    .item {
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 6px;
    }

    .item:hover {
      background: #222;
    }
  </style>
</head>
<body>

  <aside>
    <input type="text" id="search" placeholder="Hledat..." />
    <div id="menu"></div>
  </aside>

  <main id="content">
    <h1>Načítání...</h1>
  </main>

  <!-- Highlight.js (PRIMARY) -->
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js"></script>

  <!-- Fallback pokud CDN failne -->
  <script>
    if (typeof hljs === "undefined") {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js";
      document.head.appendChild(s);
    }
  </script>

  <script>
    const owner = "filipstrnad";
    const repo = "blog-docs";
    const path = "";

    const menu = document.getElementById("menu");
    const content = document.getElementById("content");
    const searchInput = document.getElementById("search");

    let files = [];

    async function fetchFiles() {
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
      const data = await res.json();

      files = data.filter(f => f.name.endsWith(".md"));
      renderMenu(files);
    }

    function renderMenu(list) {
      menu.innerHTML = "";
      list.forEach(file => {
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = file.name;
        div.onclick = () => loadFile(file.download_url);
        menu.appendChild(div);
      });
    }

    async function loadFile(url) {
      const res = await fetch(url);
      const text = await res.text();

      content.innerHTML = marked.parse(text);

      // highlight až když existuje hljs
      waitForHLJS(() => {
        hljs.highlightAll();
      });
    }

    function waitForHLJS(cb) {
      if (typeof hljs !== "undefined") {
        cb();
      } else {
        setTimeout(() => waitForHLJS(cb), 50);
      }
    }

    searchInput.addEventListener("input", () => {
      const val = searchInput.value.toLowerCase();
      const filtered = files.filter(f => f.name.toLowerCase().includes(val));
      renderMenu(filtered);
    });

    // Markdown parser (lightweight)
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";
    script.onload = fetchFiles;
    document.head.appendChild(script);
  </script>

</body>
</html>
