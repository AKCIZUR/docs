<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/tokyo-night-dark.min.css">
    <style>
        :root {
            --accent: #4b6ef5;
            --accent-hover: #6382f7;
            --accent-subtle: rgba(75, 110, 245, 0.12);
            --bg-base: #1a1d23;
            --bg-sidebar: #151820;
            --bg-sidebar-hover: #1e2230;
            --bg-sidebar-active: #252a3a;
            --bg-code: #0d1017;
            --border: #252a37;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --sidebar-width: 280px;
            --toc-width: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigace vlevo */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .site-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .search-container { padding: 1rem; }
        #search {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }
        #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }

        .nav-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.75rem;
            list-style: none;
        }

        .tree-node { margin-bottom: 2px; }
        .tree-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-dim);
            transition: all 0.15s;
        }
        .tree-item:hover { background: var(--bg-sidebar-hover); color: var(--text-main); }
        .tree-item.active { background: var(--bg-sidebar-active); color: var(--accent); font-weight: 500; }

        .toggle {
            width: 1.25rem;
            display: flex;
            align-items: center;
            margin-right: 0.25rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .tree-node.open > .tree-item > .toggle { transform: rotate(90deg); }
        .children {
            display: none;
            padding-left: 1.25rem;
            margin-left: 0.6rem;
            border-left: 1px solid var(--border);
        }
        .tree-node.open > .children { display: block; }

        /* Hlavní plocha */
        .viewport {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 5rem;
        }

        /* Drobečková navigace */
        .breadcrumbs {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
        }

        /* Pravý panel - Obsah stránky (TOC) */
        .toc-sidebar {
            width: var(--toc-width);
            padding: 4rem 1.5rem;
            border-left: 1px solid var(--border);
            overflow-y: auto;
            flex-shrink: 0;
        }
        @media (max-width: 1200px) { .toc-sidebar { display: none; } }

        .toc-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .toc-list { list-style: none; }
        .toc-item {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: color 0.2s;
            display: block;
            text-decoration: none;
        }
        .toc-item:hover { color: var(--accent); }
        .toc-item.h3 { padding-left: 1rem; font-size: 0.8rem; }

        /* Markdown Styling */
        .markdown-body h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; font-weight: 700; }
        .markdown-body h2 { font-size: 1.6rem; margin: 2.5rem 0 1rem; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; color: #fff; }
        .markdown-body p { margin-bottom: 1.25rem; color: var(--text-dim); line-height: 1.7; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }

        /* Kód s tlačítkem */
        .code-wrap { position: relative; margin: 1.5rem 0; }
        .copy-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
        }
        .code-wrap:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--accent); color: white; }

        .markdown-body pre {
            background: var(--bg-code);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        .markdown-body code { font-family: var(--font-mono); font-size: 0.9em; background: rgba(255,255,255,0.08); padding: 0.2rem 0.4rem; border-radius: 4px; }
        .markdown-body pre code { background: none; padding: 0; }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            background: rgba(75, 110, 245, 0.05);
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
        }

        /* Mobile */
        #menu-toggle {
            display: none;
            position: fixed;
            bottom: 2rem; right: 2rem;
            width: 3.5rem; height: 3.5rem;
            background: var(--accent);
            color: white; border: none; border-radius: 50%;
            z-index: 1000; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); transition: 0.3s; height: 100%; }
            body.sidebar-open .sidebar { transform: translateX(0); }
            #menu-toggle { display: block; }
        }

        .loader { display: flex; justify-content: center; padding: 5rem; }
        .spinner { width: 2rem; height: 2rem; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <button id="menu-toggle">☰</button>
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="site-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span id="site-name">Dokumentace</span>
            </a>
        </div>
        <div class="search-container"><input type="text" id="search" placeholder="Hledat..."></div>
        <ul class="nav-tree" id="fileTree"></ul>
    </aside>

    <div class="viewport">
        <div class="content-wrapper" id="scroll-container">
            <div class="content-container">
                <div class="breadcrumbs" id="breadcrumbs"></div>
                <main class="markdown-body" id="content">
                    <div class="loader"><div class="spinner"></div></div>
                </main>
            </div>
        </div>
        <aside class="toc-sidebar">
            <div class="toc-title">Na této stránce</div>
            <nav class="toc-list" id="toc-list"></nav>
        </aside>
    </div>

    <script>
        const CONFIG = { owner: 'filipstrnad', repo: 'blog-docs', defaultFile: 'README.md' };
        let OWNER = CONFIG.owner, REPO = CONFIG.repo;

        // Detekce prostředí
        if (window.location.hostname.endsWith('.github.io')) {
            OWNER = window.location.hostname.split('.')[0];
            const parts = window.location.pathname.split('/').filter(p => p && !p.endsWith('.html'));
            if (parts.length > 0) REPO = parts[0];
            document.getElementById('site-name').textContent = REPO.charAt(0).toUpperCase() + REPO.slice(1);
        }

        // GitHub API
        async function fetchGH(path = '') {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`);
            return res.ok ? await res.json() : [];
        }

        async function getTree(path = '') {
            const items = await fetchGH(path);
            const nodes = [];
            for (const item of items) {
                if (item.type === 'dir') {
                    const children = await getTree(item.path);
                    if (children.length > 0) nodes.push({ type: 'dir', name: item.name, path: item.path, children });
                } else if (item.name.toLowerCase().endsWith('.md')) {
                    nodes.push({ type: 'file', name: item.name.replace(/\.md$/i, ''), path: item.path, url: item.download_url });
                }
            }
            return nodes.sort((a,b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1));
        }

        function renderTree(nodes, container) {
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = 'tree-node';
                const item = document.createElement('div');
                item.className = 'tree-item';
                item.innerHTML = `
                    <span class="toggle">${node.type === 'dir' ? '▶' : ''}</span>
                    <span class="name">${node.name}</span>
                `;
                li.appendChild(item);

                if (node.type === 'dir') {
                    const childUl = document.createElement('ul');
                    childUl.className = 'children';
                    renderTree(node.children, childUl);
                    li.appendChild(childUl);
                    item.onclick = () => li.classList.toggle('open');
                } else {
                    item.onclick = () => {
                        document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        loadFile(node.url, node.path);
                        if (window.innerWidth <= 768) document.body.classList.remove('sidebar-open');
                    };
                    item.dataset.path = node.path;
                }
                container.appendChild(li);
            });
        }

        async function loadFile(url, path) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                const title = path.split('/').pop().replace(/\.md$/i, '');
                
                // Render Markdown
                content.innerHTML = `<h1>${title}</h1>` + marked.parse(text);
                
                // Breadcrumbs
                const parts = path.split('/');
                document.getElementById('breadcrumbs').innerHTML = parts.map((p, i) => `<span>${p.replace(/\.md$/i,'')}</span>${i < parts.length-1 ? ' / ' : ''}`).join('');

                // TOC & Highlights
                generateTOC();
                wrapCodeBlocks();
                content.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                document.getElementById('scroll-container').scrollTop = 0;
            } catch (e) {
                content.innerHTML = `<p style="color:red">Chyba: ${e.message}</p>`;
            }
        }

        function generateTOC() {
            const toc = document.getElementById('toc-list');
            toc.innerHTML = '';
            const headings = document.querySelectorAll('#content h2, #content h3');
            headings.forEach((h, i) => {
                const id = 'h-' + i;
                h.id = id;
                const a = document.createElement('a');
                a.className = `toc-item ${h.tagName.toLowerCase()}`;
                a.textContent = h.textContent;
                a.href = '#' + id;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
                };
                toc.appendChild(a);
            });
        }

        function wrapCodeBlocks() {
            document.querySelectorAll('pre').forEach(pre => {
                const wrap = document.createElement('div');
                wrap.className = 'code-wrap';
                pre.parentNode.insertBefore(wrap, pre);
                wrap.appendChild(pre);
                
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Kopírovat';
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.innerText);
                    btn.textContent = 'Zkopírováno!';
                    setTimeout(() => btn.textContent = 'Kopírovat', 2000);
                };
                wrap.appendChild(btn);
            });
        }

        // Vyhledávání
        document.getElementById('search').oninput = e => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.tree-node').forEach(n => {
                const match = n.querySelector('.name').textContent.toLowerCase().includes(q);
                n.style.display = match || q === '' ? '' : 'none';
                if (q && match) {
                    let p = n.parentElement.closest('.tree-node');
                    while(p) { p.classList.add('open'); p = p.parentElement.closest('.tree-node'); }
                }
            });
        };

        document.getElementById('menu-toggle').onclick = () => document.body.classList.toggle('sidebar-open');

        async function init() {
            const tree = await getTree(CONFIG.rootPath);
            renderTree(tree, document.getElementById('fileTree'));
            
            const first = (function find(list) {
                for(let n of list) { if(n.type==='file') return n; if(n.children){const f=find(n.children); if(f) return f;} }
            })(tree);

            if (first) {
                loadFile(first.url, first.path);
                document.querySelector(`[data-path="${first.path}"]`)?.classList.add('active');
            }
        }
        init();
    </script>
</body>
</html>
