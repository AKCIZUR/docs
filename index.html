<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentace - Rekurzivní Načítání</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css">
    <style>
        :root {
            --accent: #a5b4fc;
            --bg-body: #0a0c10;
            --bg-glass: rgba(17, 19, 24, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-main: #d1d5db;
            --text-dim: #9ca3af;
            --text-muted: #6b7280;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%);
            z-index: -1;
            opacity: 0.4;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header { padding: 2rem 1.5rem 1rem; }
        .site-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: #fff; font-weight: 500; font-size: 0.9rem; opacity: 0.9; }

        .search-container { padding: 1rem 1.5rem; }
        #search {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
        }

        .nav-tree { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; list-style: none; }
        .tree-item { display: flex; align-items: center; padding: 0.45rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); transition: 0.2s; }
        .tree-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .tree-item.active { color: var(--accent); background: rgba(165, 180, 252, 0.06); }
        
        .toggle { 
            width: 1.2rem; 
            font-size: 0.6rem; 
            opacity: 0.3; 
            transition: transform 0.2s; 
            display: inline-block;
            text-align: center;
        }
        .tree-node.open > .tree-item > .toggle { transform: rotate(90deg); }
        
        .children { 
            display: none; 
            padding-left: 0.8rem; 
            border-left: 1px solid var(--border-subtle); 
            margin-left: 0.6rem; 
            list-style: none;
        }
        .tree-node.open > .children { display: block; }

        .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
        .status-badge { font-size: 0.65rem; color: #10b981; display: flex; align-items: center; gap: 0.3rem; }

        .viewport { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        .content-container { max-width: 760px; margin: 4rem auto 8rem; padding: 0 2rem; }
        .breadcrumbs { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3rem; }

        .markdown-body { font-size: 1rem; line-height: 1.7; }
        .markdown-body h1 { font-size: 2.25rem; color: #fff; margin-bottom: 2rem; }
        pre { background: rgba(0, 0, 0, 0.2); padding: 1.25rem; border-radius: 10px; border: 1px solid var(--border-subtle); margin: 1.5rem 0; overflow-x: auto; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: var(--accent); }

        .loader { width: 20px; height: 20px; border: 2px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #menu-toggle { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; width: 3rem; height: 3rem; border-radius: 50%; background: var(--accent); z-index: 100; border: none; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; transition: 0.3s; }
            body.sidebar-open .sidebar { left: 0; }
            #menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <button id="menu-toggle">☰</button>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="site-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span>DOKUMENTACE</span>
            </a>
        </div>
        <div class="search-container"><input type="text" id="search" placeholder="Hledat..."></div>
        <ul class="nav-tree" id="fileTree"></ul>
        <div class="sidebar-footer">
            <div class="status-badge">
                <span style="width: 6px; height: 6px; background: #10b981; border-radius: 50%;"></span>
                AUTORIZOVANÝ PŘÍSTUP
            </div>
        </div>
    </aside>

    <div class="viewport" id="scroll-container">
        <div class="content-container">
            <nav class="breadcrumbs" id="breadcrumbs"></nav>
            <main class="markdown-body" id="content">
                <div style="display:flex; justify-content:center; padding-top: 4rem;"><div class="loader"></div></div>
            </main>
        </div>
    </div>

    <script>
        // Konfigurace
        const CONFIG = { 
            owner: 'filipstrnad', 
            repo: 'blog-docs', 
            branch: 'main',
            token: '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'
        };

        function getAuthHeaders() {
            return { 'Authorization': `token ${CONFIG.token}` };
        }

        // PŮVODNÍ FUNKCE: Načítání obsahu složky z GitHub API (ne rekurzivní)
        async function fetchPath(path = "") {
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`;
            try {
                const res = await fetch(url, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error("Chyba při načítání API");
                return await res.json();
            } catch (err) {
                console.error(err);
                return [];
            }
        }

        // Vykreslení stromu (rekurzivní volání pro podsložky)
        async function buildTree(path, container) {
            const items = await fetchPath(path);
            
            // Třídění: nejdřív složky, pak soubory
            items.sort((a, b) => a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1);

            for (const item of items) {
                if (item.name.startsWith('.')) continue; // Přeskočit skryté
                if (item.type !== 'dir' && !item.name.endsWith('.md')) continue; // Pouze složky a MD

                const li = document.createElement('li');
                li.className = 'tree-node';
                
                const div = document.createElement('div');
                div.className = 'tree-item';
                div.innerHTML = `<span class="toggle">${item.type === 'dir' ? '▶' : ''}</span><span>${item.type === 'dir' ? item.name : item.name.replace('.md', '')}</span>`;
                li.appendChild(div);

                if (item.type === 'dir') {
                    const ul = document.createElement('ul');
                    ul.className = 'children';
                    li.appendChild(ul);
                    
                    let loaded = false;
                    div.onclick = async (e) => {
                        e.stopPropagation();
                        li.classList.toggle('open');
                        if (!loaded) {
                            div.style.opacity = "0.5";
                            await buildTree(item.path, ul);
                            div.style.opacity = "1";
                            loaded = true;
                        }
                    };
                } else {
                    div.onclick = (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
                        div.classList.add('active');
                        loadFile(item.download_url, item.path);
                        if (window.innerWidth <= 768) document.body.classList.remove('sidebar-open');
                    };
                }
                container.appendChild(li);
            }
        }

        // Načtení konkrétního souboru
        async function loadFile(url, path) {
            const content = document.getElementById('content');
            content.innerHTML = '<div style="display:flex; justify-content:center; padding-top: 4rem;"><div class="loader"></div></div>';
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Soubor nelze stáhnout.");
                const text = await res.text();
                content.innerHTML = marked.parse(text);
                document.getElementById('breadcrumbs').innerText = path.replace(/\.md$/i, '').split('/').join(' / ');
                document.querySelectorAll('pre code').forEach(c => hljs.highlightElement(c));
                document.getElementById('scroll-container').scrollTop = 0;
            } catch (err) {
                content.innerHTML = `<p style="color: #f87171; text-align:center; padding: 2rem;">Chyba: ${err.message}</p>`;
            }
        }

        // Inicializace
        (async function init() {
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            await buildTree("", container);
            
            // Načíst první soubor v kořeni, pokud existuje
            const firstFile = container.querySelector('.tree-item:not(:has(.toggle:empty))');
            // Pro jednoduchost necháme uživatele kliknout nebo načteme README.md pokud existuje
        })();

        document.getElementById('menu-toggle').onclick = () => document.body.classList.toggle('sidebar-open');
    </script>
</body>
</html>
